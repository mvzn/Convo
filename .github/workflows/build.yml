name: Build

# Manual-only: this workflow never runs automatically on push/PR.
# Trigger it from the Actions tab ("Run workflow") when you want a build.
on:
  workflow_dispatch:
    inputs:
      macos:
        description: "Also build macOS (off by default — slow, 10x-cost runner)"
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.os }} (${{ matrix.build_type }})
    runs-on: ${{ matrix.os }}
    # Windows: force MSVC embedded debug info (/Z7) for EVERY cl.exe, appended after the
    # command line so it overrides any /Zi. This reaches JUCE's juceaide helper — a separate
    # nested CMake build (Debug, /Zi /MP) that ignores the configure-time
    # CMAKE_MSVC_DEBUG_INFORMATION_FORMAT and otherwise races on a shared vc140.pdb under
    # sccache (fatal C1041 at configure time). No-op on Linux/macOS (no cl.exe).
    # Use the dash form -Z7 (not /Z7): Git Bash / MSYS would treat a leading-slash value
    # as a Unix path and mangle it; cl.exe accepts the dash form.
    env:
      _CL_: -Z7
    strategy:
      fail-fast: false
      matrix:
        # macOS is opt-in via the workflow_dispatch "macos" input — skipped by default so a
        # routine run only spins up Linux + Windows (macOS is the 10x-cost runner). Use the
        # *typed* inputs.macos (boolean): github.event.inputs.macos is the string "false",
        # which is truthy, and would build macOS every time.
        os: ${{ fromJSON(inputs.macos && '["ubuntu-latest", "windows-latest", "macos-latest"]' || '["ubuntu-latest", "windows-latest"]') }}
        build_type: [Release]

    steps:
      - uses: actions/checkout@v4

      - name: Read version
        shell: bash
        run: |
          V=$(grep -m1 -oE 'project\(Convo VERSION [0-9]+\.[0-9]+\.[0-9]+' CMakeLists.txt | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          echo "CONVO_VERSION=$V" >> "$GITHUB_ENV"
          echo "Convo version: $V"

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev libfreetype-dev libfontconfig1-dev \
            libgtk-3-dev libxinerama-dev libxrandr-dev libxcursor-dev \
            libxcomposite-dev mesa-common-dev ninja-build xvfb libcurl4-openssl-dev

      - if: runner.os != 'Linux'
        uses: seanmiddleditch/gha-setup-ninja@v5

      - if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - uses: actions/cache@v4
        with:
          path: build/_deps
          key: deps-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            deps-${{ runner.os }}-

      - uses: hendrikmuhs/ccache-action@v1.2
        with:
          variant: sccache
          key: sccache-${{ matrix.os }}-${{ matrix.build_type }}
          max-size: 500M

      - name: Configure
        shell: bash
        run: |
          mkdir -p logs
          LOG="logs/build-${{ runner.os }}-${{ github.run_number }}-${{ github.sha }}.log"
          {
            echo "=== Build log ==="
            echo "Run: ${{ github.run_number }} | Commit: ${{ github.sha }}"
            echo "OS: ${{ runner.os }} | Build: ${{ matrix.build_type }}"
            echo "Timestamp: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "================="
            echo "--- CMake configure ---"
          } | tee "$LOG"
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64" \
            -DCMAKE_C_COMPILER_LAUNCHER=sccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=sccache \
            -DCMAKE_POLICY_DEFAULT_CMP0141=NEW \
            -DCMAKE_MSVC_DEBUG_INFORMATION_FORMAT=Embedded 2>&1 | tee -a "$LOG"
          echo "LOG_FILE=$LOG" >> "$GITHUB_ENV"

      - name: Build
        shell: bash
        run: |
          echo >> "$LOG_FILE"
          echo "--- CMake build ---" | tee -a "$LOG_FILE"
          cmake --build build --config ${{ matrix.build_type }} --parallel 2>&1 | tee -a "$LOG_FILE"
          echo "--- sccache stats ---" | tee -a "$LOG_FILE"
          sccache --show-stats 2>&1 | tee -a "$LOG_FILE" || true

      # Strict (level 10) plugin validation: parameters, state, threading, and the editor.
      # pluginval needs a display, so Linux runs under xvfb. macOS validates the AU too.
      - name: Validate (pluginval)
        shell: bash
        run: |
          set -e
          BASE="https://github.com/Tracktion/pluginval/releases/latest/download"
          VST3="build/Convo_artefacts/${{ matrix.build_type }}/VST3/Convo.vst3"
          case "$RUNNER_OS" in
            Linux)
              curl -sSL -o pv.zip "$BASE/pluginval_Linux.zip"
              unzip -o -q pv.zip && chmod +x pluginval
              xvfb-run -a ./pluginval --strictness-level 10 --validate "$VST3"
              ;;
            Windows)
              curl -sSL -o pv.zip "$BASE/pluginval_Windows.zip"
              7z x -y pv.zip > /dev/null
              ./pluginval.exe --strictness-level 10 --validate "$VST3"
              ;;
            macOS)
              curl -sSL -o pv.zip "$BASE/pluginval_macOS.zip"
              unzip -o -q pv.zip
              PV="pluginval.app/Contents/MacOS/pluginval"
              "$PV" --strictness-level 10 --validate "$VST3"
              "$PV" --strictness-level 10 --validate "build/Convo_artefacts/${{ matrix.build_type }}/AU/Convo.component"
              ;;
          esac

      - name: Package installer (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: packaging/linux/build-tarball.sh "$CONVO_VERSION"

      - name: Package installer (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          choco install innosetup -y --no-progress
          "/c/Program Files (x86)/Inno Setup 6/ISCC.exe" "//DAppVersion=$CONVO_VERSION" packaging/windows/Convo.iss

      - name: Package installer (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: packaging/macos/build-pkg.sh "$CONVO_VERSION"

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: Convo-${{ runner.os }}-installer
          path: dist/
          if-no-files-found: error
          retention-days: 30

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ runner.os }}-${{ github.run_number }}
          path: logs/
          if-no-files-found: warn
          retention-days: 30

      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: Convo-${{ runner.os }}-VST3
          path: build/Convo_artefacts/${{ matrix.build_type }}/VST3/
          if-no-files-found: error
          retention-days: 30

      - name: Upload AU (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: Convo-macOS-AU
          path: build/Convo_artefacts/${{ matrix.build_type }}/AU/
          if-no-files-found: warn
          retention-days: 30
