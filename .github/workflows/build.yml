name: Build

# Manual-only: this workflow never runs automatically on push/PR.
# Trigger it from the Actions tab ("Run workflow") when you want a build.
on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.os }} (${{ matrix.build_type }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        build_type: [Release]

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev libfreetype-dev libfontconfig1-dev \
            libgtk-3-dev libxinerama-dev libxrandr-dev libxcursor-dev \
            libxcomposite-dev mesa-common-dev ninja-build

      - if: runner.os != 'Linux'
        uses: seanmiddleditch/gha-setup-ninja@v5

      - if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - uses: actions/cache@v4
        with:
          path: build/_deps
          key: deps-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            deps-${{ runner.os }}-

      - uses: hendrikmuhs/ccache-action@v1.2
        with:
          variant: sccache
          key: sccache-${{ matrix.os }}-${{ matrix.build_type }}
          max-size: 500M

      - name: Configure
        shell: bash
        run: |
          mkdir -p logs
          LOG="logs/build-${{ runner.os }}-${{ github.run_number }}-${{ github.sha }}.log"
          {
            echo "=== Build log ==="
            echo "Run: ${{ github.run_number }} | Commit: ${{ github.sha }}"
            echo "OS: ${{ runner.os }} | Build: ${{ matrix.build_type }}"
            echo "Timestamp: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "================="
            echo "--- CMake configure ---"
          } | tee "$LOG"
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64" \
            -DCMAKE_C_COMPILER_LAUNCHER=sccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=sccache \
            -DCMAKE_POLICY_DEFAULT_CMP0141=NEW \
            -DCMAKE_MSVC_DEBUG_INFORMATION_FORMAT=Embedded 2>&1 | tee -a "$LOG"
          echo "LOG_FILE=$LOG" >> "$GITHUB_ENV"

      - name: Build
        shell: bash
        run: |
          echo >> "$LOG_FILE"
          echo "--- CMake build ---" | tee -a "$LOG_FILE"
          cmake --build build --config ${{ matrix.build_type }} --parallel 2>&1 | tee -a "$LOG_FILE"
          echo "--- sccache stats ---" | tee -a "$LOG_FILE"
          sccache --show-stats 2>&1 | tee -a "$LOG_FILE" || true

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ runner.os }}-${{ github.run_number }}
          path: logs/
          if-no-files-found: warn
          retention-days: 30

      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: Convo-${{ runner.os }}-VST3
          path: build/Convo_artefacts/${{ matrix.build_type }}/VST3/
          if-no-files-found: error
          retention-days: 30

      - name: Upload AU (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: Convo-macOS-AU
          path: build/Convo_artefacts/${{ matrix.build_type }}/AU/
          if-no-files-found: warn
          retention-days: 30
